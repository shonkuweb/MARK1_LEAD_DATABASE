<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard | Internal Lead System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container animate-in">
        <header>
            <div class="logo">MARK1_INTERNAL</div>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="nav-links" id="navLinks">
                <a href="index.html" class="active">Dashboard</a>
                <a href="entry.html">New Entry</a>
                <a href="ai-upload.html">AI Bulk Upload</a>
                <a href="settings.html">Settings</a>
            </nav>
        </header>

        <main>
            <div class="dashboard-top">
                <div>
                    <h1>Leads Overview</h1>
                    <p class="subtitle" style="margin-bottom: 0;">Managing internal business acquisition leads.</p>
                </div>
                <a href="entry.html" class="btn">+ New Lead</a>
            </div>

            <!-- Stats Section -->
            <div id="statsBar" class="stats-bar">
                <div class="stat-card">
                    <span class="stat-label">Total Leads</span>
                    <span class="stat-number" id="totalCount">—</span>
                </div>
                <div id="categoryStats" class="category-stats"></div>
            </div>

            <!-- Desktop Table -->
            <div class="table-container">
                <table class="leads-table">
                    <thead>
                        <tr id="tableHeaders">
                            <!-- Headers rendered dynamically -->
                        </tr>
                    </thead>
                    <tbody id="leadsBody">
                        <tr><td colspan="10" style="text-align:center;color:var(--muted);padding:3rem;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Mobile Card View -->
            <div class="leads-cards" id="leadsCards">
                <!-- Cards rendered dynamically by JS -->
            </div>
        </main>
    </div>

    <!-- Custom Premium Delete Modal -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-family: var(--font-serif); margin-bottom: 1rem;">Are you sure?</h2>
            <p style="color: var(--muted); margin-bottom: 2rem; font-size: 0.9rem;">This action will permanently remove this lead from your internal database. This cannot be undone.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button id="cancelDelete" class="btn btn-outline" style="padding: 0.8rem 1.5rem;">Cancel</button>
                <button id="confirmDelete" class="btn" style="padding: 0.8rem 1.5rem; background: #ff4444; color: white; border: none;">Delete Lead</button>
            </div>
        </div>
    </div>

    <!-- Remark Popup Modal -->
    <div id="remarkModal" class="modal-overlay">
        <div class="remark-modal-content">
            <span class="remark-label">Remarks for</span>
            <h2 id="remarkTitle" style="font-family: var(--font-serif); margin-bottom: 1.5rem;">—</h2>
            <div class="remark-body-wrapper">
                <p id="remarkBody" class="remark-body">—</p>
            </div>
            <button id="closeRemark" class="btn" style="margin-top: 2rem; padding: 0.8rem 2rem;">Close</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
